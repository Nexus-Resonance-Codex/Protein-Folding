site_name: NRC Protein-Folding
site_description: Institutional-Grade Bio-Lattice Protein Folding Accelerator
site_url: https://Nexus-Resonance-Codex.github.io/Protein-Folding/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: lime
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: green
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - footnotes
  - attr_list

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Distributed Computing: DISTRIBUTED_COMPUTING_INTEGRATION.md
