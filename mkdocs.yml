site_name: NRC Protein-Folding
site_url: https://nexus-resonance-codex.github.io/Protein-Folding/
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: cyan
  font:
    text: Outfit
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.tooltips
  logo: https://raw.githubusercontent.com/Nexus-Resonance-Codex/Phi-Infinity-Lattice-Compression/main/docs/assets/phi_spiral_banner.png

extra_css:
  - stylesheets/extra.css

nav:
  - 'Home': 'index.md'
  - '🚀 Flagship Showcase': 'demos/protein-folding-showcase.html'
  - '🕹 Playground Hub': 'NRC-Playground-Guide.md'
  - '📐 Math Foundations': 'math-foundations.md'
  - '📽 Demo Arena':
    - 'Folding Showcase': 'demos/protein-folding-showcase.html'
    - 'Lattice Mode': 'demos/lattice-visualizer-protein-mode.html'
    - 'Scaling Benchmarks': 'demos/rmsd-benchmark.html'
    - 'Cosmic Math': 'demos/cosmic-math.html'
  - '🏗 Architecture': 'architecture.md'
  - '📦 Distributed Computing': 'DISTRIBUTED_COMPUTING_INTEGRATION.md'

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
