site_name: Protein-Folding
site_description: Professional-Grade Protein Folding via φ^∞ Lattice Resonance
site_author: James Trageser
site_url: https://Nexus-Resonance-Codex.github.io/Protein-Folding/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: light blue
      accent: gold
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light blue
      accent: gold
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Interactive Demos:
      - Real-time Folding: demos/folding-demo.html
      - Lattice Visualizer: demos/lattice-visualizer.html
      - Cosmic Math: demos/cosmic-math.html
  - Technical Documentation:
      - Architecture: architecture.md
      - Distributed Integration: DISTRIBUTED_COMPUTING_INTEGRATION.md
  - Professional Artifacts:
      - LaTeX Full Paper: Nexus-Resonance-Codex-tex-files/main.pdf

plugins:
  - search
  - minify:
      minify_html: true
