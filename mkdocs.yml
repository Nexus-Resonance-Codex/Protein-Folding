site_name: NRC Protein-Folding
site_url: https://nexus-resonance-codex.github.io/Protein-Folding/
theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: cyan
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

nav:
  - '🚀 Flagship Showcase': 'demos/protein-folding-showcase.html'
  - 'Home': 'index.md'
  - '📐 Math Foundations': 'math-foundations.md'
  - '🕹 Playground Hub': 'NRC-Playground-Guide.md'
  - '🏗 Architecture': 'architecture.md'
  - '🌀 Lattice Visualizer': 'demos/lattice-visualizer.html'
  - '📦 Distributed Computing': 'DISTRIBUTED_COMPUTING_INTEGRATION.md'

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
