<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRC | 256D-729D Lattice Visualizer</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #00f0ff;
            --phi-gold: #ffcc33;
            --text-color: #e0e0e0;
            --panel-bg: rgba(20, 20, 20, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        #container {
            width: 100vw;
            height: 100vh;
        }

        .overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }

        .header {
            border-left: 2px solid var(--accent-color);
            padding-left: 15px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-color);
        }

        .header p {
            margin: 5px 0 0;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .stats {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--panel-bg);
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.75rem;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }

        .stat-item {
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .stat-label { color: var(--accent-color); }
        .stat-value { color: var(--phi-gold); }

        .branding {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.7rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }

        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            background: var(--panel-bg);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <div class="overlay">
        <div class="header">
            <h1>Lattice Projection</h1>
            <p>256D &rarr; 729D Manifold Resonance</p>
        </div>
    </div>

    <div id="controls">
        <button id="resetRotation">Reset View</button>
        <button id="toggleLattice">Toggle Points</button>
        <button id="toggleEdges">Toggle Edges</button>
    </div>

    <div class="stats">
        <div class="stat-item">
            <span class="stat-label">Projected Dimension:</span>
            <span class="stat-value">729 (3^6)</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Lattice Symmetry:</span>
            <span class="stat-value">E8 Root</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Resonance Locus:</span>
            <span class="stat-value">0.618033...</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Stability Root:</span>
            <span class="stat-value">7</span>
        </div>
    </div>

    <div class="branding">NEXUS RESONANCE CODEX | &phi;^&infin; SYSTEM</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- NRC Visualization Engine ---
        
        let scene, camera, renderer, controls;
        let latticePoints, latticeEdges;
        let phi = (1 + Math.sqrt(5)) / 2;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 250;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // --- Create Lattice ---
            createLattice();

            // --- Lights ---
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x00f0ff, 1);
            pointLight.position.set(100, 100, 100);
            scene.add(pointLight);

            window.addEventListener('resize', onWindowResize, false);
            
            // Buttons
            document.getElementById('resetRotation').onclick = () => {
                camera.position.set(0, 0, 250);
                controls.reset();
            };
            document.getElementById('toggleLattice').onclick = () => {
                latticePoints.visible = !latticePoints.visible;
            };
            document.getElementById('toggleEdges').onclick = () => {
                latticeEdges.visible = !latticeEdges.visible;
            };
        }

        function createLattice() {
            const points = [];
            const count = 729; // Representative of the 729D projection
            const size = 100;

            // Generate points based on Golden Spiral (Phyllotaxis) mapping into 3D
            const phi_angle = Math.PI * (3 - Math.sqrt(5)); 

            for (let i = 0; i < count; i++) {
                const y = 1 - (i / (count - 1)) * 2;
                const radius = Math.sqrt(1 - y * y);
                const theta = phi_angle * i;

                const x = Math.cos(theta) * radius;
                const z = Math.sin(theta) * radius;

                // Scale by size and apply small resonant perturbation
                const scalar = size + Math.sin(i * 0.1) * 5;
                points.push(new THREE.Vector3(x * scalar, y * scalar, z * scalar));
            }

            // Points Mesh
            const pointsGeometry = new THREE.BufferGeometry().setFromPoints(points);
            const pointsMaterial = new THREE.PointsMaterial({
                color: 0x00f0ff,
                size: 2,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            latticePoints = new THREE.Points(pointsGeometry, pointsMaterial);
            scene.add(latticePoints);

            // Edges Mesh (Lattice connections)
            const edgeGeometry = new THREE.BufferGeometry();
            const edgeIndices = [];
            for (let i = 0; i < count; i++) {
                // Connect to nearest neighbors based on index (simulating local lattice structure)
                for (let j = 1; j <= 3; j++) {
                    if (i + j < count) {
                        edgeIndices.push(i, i + j);
                    }
                }
            }
            edgeGeometry.setFromPoints(points);
            edgeGeometry.setIndex(edgeIndices);
            
            const edgeMaterial = new THREE.LineBasicMaterial({
                color: 0x004044,
                transparent: true,
                opacity: 0.2,
                blending: THREE.AdditiveBlending
            });
            latticeEdges = new THREE.LineSegments(edgeGeometry, edgeMaterial);
            scene.add(latticeEdges);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Subtle resonant oscillation
            const time = Date.now() * 0.001;
            latticePoints.rotation.y += 0.001;
            latticeEdges.rotation.y += 0.001;
            
            latticePoints.scale.setScalar(1 + Math.sin(time) * 0.02);
            latticeEdges.scale.setScalar(1 + Math.sin(time) * 0.02);

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
