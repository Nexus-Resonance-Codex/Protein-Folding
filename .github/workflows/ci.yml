name: NRC Protein-Folding CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  integrity-audit:
    name: Professional Integrity Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        uv venv .venv
        uv pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision torchaudio
        uv pip install -e .[dev]

    - name: Format Check (Ruff)
      run: uv run ruff format --check --exclude hf-spaces .

    - name: Lint Check (Ruff)
      run: uv run ruff check --exclude hf-spaces .

    - name: Type Compliance (Mypy)
      run: uv run mypy --exclude hf-spaces .

    - name: Verification Suite (Pytest)
      run: uv run pytest tests/
