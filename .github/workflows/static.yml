name: "NRC Protein-Folding: 100% Integrity Suite & Deployment"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  verify:
    name: "Bio-Lattice Integrity Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Dependencies
        run: |
          pip install "nrc-math @ git+https://github.com/Nexus-Resonance-Codex/NRC.git"
          pip install -e ".[dev]"
      - name: Run Tests
        run: |
          pytest tests/ -v

  deploy-site:
    name: "Deploy Flagship Documentation"
    needs: verify
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Documentation Engines
        run: |
          pip install mkdocs-material mkdocs-minify-plugin
      - name: Build MkDocs Site
        run: |
          mkdocs build
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "site"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
