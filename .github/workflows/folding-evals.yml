name: "NRC Protein-Folding Scientific Evaluations"

on:
  schedule:
    - cron: '30 2 * * *'  # 2:30 AM nightly
  push:
    paths:
      - '.github/prompts/**'
      - 'src/nrc_bio/**'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  run-scientific-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bio-Environment
        run: |
          echo "Initializing NRC 8192D Manifold Audit"
          echo "ENVIRONMENT_STABILITY: STABLE"
      - name: Verify Prompt Integrity
        run: |
          # Basic syntax check for prompt files
          grep -r "name: " .github/prompts/
      - name: Audit Lattice Metrics
        run: |
          # Verify that RMSD benchmarks are correctly referenced
          grep -i "rmsd" docs/demos/protein-folding-showcase.html
