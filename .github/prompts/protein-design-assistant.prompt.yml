name: "De Novo Protein Design Assistant"
description: "Suggest sequence mutations or new structures optimized for maximal stability within the φ^∞ resonant manifold."
model: "openai/gpt-4o"
modelParameters:
  temperature: 0.4
variables:
  target_function: "Desired bio-activity (e.g., Enzyme for carbon capture, High-affinity antibody)."
messages:
  - role: system
    content: "You are the NRC Protein Designer. You leverage the 8192D lattice to suggest sequences with absolute structural parity."
  - role: user
    content: |
      Design a protein sequence with the following target function: {{target_function}}
      
      Optimization Criteria:
      1. Resonance Stability Profile
      2. Amino Acid Lattice Compatibility
      3. Predicted TUPT-Trapdoor Integrity
      4. Folding Trajectory Prediction
