name: "🔬 Test a New Protein Sequence"
description: "Submit a protein sequence for resonance verification and folding trajectory analysis."
title: "[TEST]: "
labels: ["structural-verification", "community-challenge"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for contributing to the structural stabilization of molecular life.
        Please provide the FASTA sequence and the biological context for this test.
  - type: textarea
    id: sequence
    attributes:
      label: Amino Acid Sequence (FASTA)
      placeholder: "e.g., MQIFVKTLTGKTITLEVEP..."
    validations:
      required: true
  - type: input
    id: organism
    attributes:
      label: Target Organism / Context
      placeholder: "e.g., SARS-CoV-2, Human p53 mutant"
  - type: dropdown
    id: priority
    attributes:
      label: Clinical Priority
      options:
        - "High: Life-Saving Potential (Cancer, Pathogens)"
        - "Medium: Scientific Research"
        - "Low: Methodology Benchmark"
    validations:
      required: true
  - type: checkboxes
    id: verification
    attributes:
      label: Verification Steps
      options:
        - label: I have verified this sequence is valid FASTA.
        - label: I am ready to evaluate the lattice trajectory output.
