<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>φ^∞ Flagship Showcase | Nexus Resonance Codex</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #050508;
            --glass-bg: rgba(10, 10, 18, 0.9);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-gold: #FFD700;
            --accent-cyan: #00F0FF;
            --accent-red: #FF3B3B;
            --phi: 1.618033988749895;
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        nav {
            padding: 1rem 2.5rem;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-pill {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 50px;
            padding: 5px 15px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #00FF88;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot { width: 6px; height: 6px; background: #00FF88; border-radius: 50%; box-shadow: 0 0 10px #00FF88; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        /* --- Main Layout --- */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 1.5rem;
            padding: 1.5rem;
            overflow: hidden;
        }

        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 2.2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.08); }

        /* --- Viewport --- */
        .viewport-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            position: relative;
        }

        .viewport-container {
            position: relative;
            background: radial-gradient(circle at center, #0a0a18 0%, #000 100%);
            border-radius: 35px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 0 100px rgba(0,240,255,0.05);
        }

        .vp-label {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(0,0,0,0.5);
            padding: 6px 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        canvas { width: 100%; height: 100%; cursor: crosshair; }

        /* --- UI Elements --- */
        select, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 1.2rem;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }
        select:focus, textarea:focus { border-color: var(--accent-cyan); box-shadow: 0 0 20px rgba(0,240,255,0.1); }

        .btn-group { display: flex; flex-direction: column; gap: 1rem; }
        .btn-primary {
            padding: 1.3rem;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-cyan));
            border: none;
            border-radius: 18px;
            color: #000;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0, 240, 255, 0.4); }

        .btn-secondary {
            padding: 1rem;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 18px;
            color: #fff;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); border-color: #fff; }

        /* --- Telemetry HUD --- */
        .telemetry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }
        .metric {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
        }
        .m-label { font-size: 0.7rem; color: #777; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .m-value { font-family: 'JetBrains Mono', monospace; font-size: 1.6rem; color: #fff; line-height: 1; }
        .m-unit { font-size: 0.9rem; color: #555; margin-left: 4px; }

        /* --- Analysis HUD --- */
        .analysis-overlay {
            position: absolute;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1rem;
            bottom: 2rem;
            left: 2rem;
            right: 2rem;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chart-box { height: 120px; margin-top: 1rem; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>
    <nav>
        <div class="brand">PHI-INFINITY BIO-MANIFOLD</div>
        <div class="status-pill">
            <div class="dot"></div>
            Lattice Core Online (v4.0.2)
        </div>
    </nav>

    <main>
        <!-- Side Controls -->
        <aside class="controls-panel">
            <div class="card">
                <div class="section-title">Sequence Selection</div>
                <select id="preset-selector" style="margin-top: 10px;">
                    <option value="ubiquitin">Ubiquitin (Standard Benchmark)</option>
                    <option value="insulin">Human Insulin (A-Chain)</option>
                    <option value="spike">SARS-CoV-2 RBD Fragment</option>
                    <option value="p53">p53 Tumor Suppressor Hub</option>
                    <option value="cas9">CRISPR-Cas9 Recognition Lobe</option>
                </select>
                <div style="margin-top: 1.5rem;">
                    <textarea id="seq-input" spellcheck="false" readonly></textarea>
                </div>
            </div>

            <div class="card">
                <div class="section-title">Engine Control</div>
                <div class="btn-group" style="margin-top: 10px;">
                    <button class="btn-primary" id="fold-btn">Start Resonance Folding</button>
                    <button class="btn-secondary" id="gh-models-btn">Run on GitHub Models</button>
                </div>
            </div>

            <div class="card" style="flex: 1;">
                <div class="section-title">Folding Telemetry</div>
                <div class="telemetry-grid" style="margin-top: 15px;">
                    <div class="metric">
                        <span class="m-label">RMSD Accuracy</span>
                        <div class="m-value" id="rmsd-val">0.000<span class="m-unit">Å</span></div>
                    </div>
                    <div class="metric">
                        <span class="m-label">Manifold Energy</span>
                        <div class="m-value" id="energy-val">-0.00<span class="m-unit">kJ</span></div>
                    </div>
                </div>
                <div class="chart-box">
                    <canvas id="rmsd-chart"></canvas>
                </div>
            </div>
        </aside>

        <!-- Viewports -->
        <section class="viewport-section">
            <div class="viewport-container">
                <div class="vp-label">Standard $O(N^2)$ Simulation</div>
                <div id="standard-visualizer"></div>
            </div>

            <div class="viewport-container" style="border-color: var(--accent-cyan);">
                <div class="vp-label" style="color: var(--accent-cyan);">NRC φ^∞ Lattice $O(N)$</div>
                <div id="lattice-visualizer"></div>
                
                <div class="analysis-overlay">
                    <div style="font-family: 'JetBrains Mono'; font-size: 0.75rem; color: #888;">
                        LATTICE: 8192D MANIFOLD<br>
                        COORD_φ: 1.618033...
                    </div>
                    <div style="text-align: right; font-family: 'JetBrains Mono'; font-size: 1.2rem; font-weight: 700; color: var(--accent-gold);">
                        <span id="speedup-val">1.0</span>x SPEEDUP
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Preset Data
        const presets = {
            ubiquitin: "MQIFVKTLTGKTITLEVEPSDTIENVKAKIQDKEGIPPDQQRLIFAGKQLEDGRTLSDYNIQKESTLHLVLRLRGG",
            insulin: "GIVEQCCTSICSLYQLENYCNFVNQHLCGSHLVEALYLVCGERGFFYTPKT",
            spike: "VNLTTRTQLPPAYTNSFTRGVYYPDKVFRSSVLHSTQDLFLPFFSNVTWFHAIHVSGTNGTKRFDNPVLPFNDGVYFASTEKS",
            p53: "MEEPQSDPSVEPPLSQETFSDLWKLLPENNVLSPLPSQAMDDLMLSPDDIEQWFTEDPGPDEAPRMPEAAPPVAPAPAAPTPAA",
            cas9: "MDKKYSIGLDIGTNSVGWAVITDEYKVPSKKFKVLGNTDRHSIKKNLIGALLFDSGETAEATRLKRTARRRYTRRKNRICYLQEIFSNEMAKVDDSFFH"
        };

        const presetSelector = document.getElementById('preset-selector');
        const seqInput = document.getElementById('seq-input');
        
        function updateSequence() {
            seqInput.value = presets[presetSelector.value];
            if(folding) resetSim();
        }
        presetSelector.onchange = updateSequence;
        updateSequence();

        // Chart Initialization
        const ctx = document.getElementById('rmsd-chart').getContext('2d');
        const rmsdChart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(30).fill(''), datasets: [{ label: 'RMSD', data: [], borderColor: '#00F0FF', borderWidth: 2, pointRadius: 0, tension: 0.4 }] },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { display: false } } },
                plugins: { legend: { display: false } },
                animation: false
            }
        });

        // Three.js Core Setup
        function createScene(elementId) {
            const container = document.getElementById(elementId);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            camera.position.z = 60;
            const group = new THREE.Group();
            scene.add(group);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const p1 = new THREE.PointLight(0x00F0FF, 1.2); p1.position.set(50, 50, 50); scene.add(p1);
            const p2 = new THREE.PointLight(0xFFD700, 0.8); p2.position.set(-50, -50, 50); scene.add(p2);

            return { scene, camera, renderer, group, atoms: [], connections: null };
        }

        const standard = createScene('standard-visualizer');
        const lattice = createScene('lattice-visualizer');

        let folding = false;
        let t = 0;

        function initAtoms(sim, len, spread) {
            sim.group.clear();
            sim.atoms = [];
            const geo = new THREE.SphereGeometry(0.7, 32, 32);
            for(let i=0; i<len; i++) {
                const color = new THREE.Color().setHSL((i/len) * 0.8, 0.9, 0.5);
                const mat = new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.1, shininess: 100 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(i*1.5 - (len*0.75), (Math.random()-0.5)*spread, (Math.random()-0.5)*spread);
                sim.group.add(mesh);
                sim.atoms.push(mesh);
            }
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 });
            const lineGeo = new THREE.BufferGeometry().setFromPoints(sim.atoms.map(a => a.position));
            sim.connections = new THREE.Line(lineGeo, lineMat);
            sim.group.add(sim.connections);
        }

        function resetSim() {
            const len = seqInput.value.length;
            initAtoms(standard, len, 15);
            initAtoms(lattice, len, 5);
            t = 0;
            rmsdChart.data.datasets[0].data = [];
            rmsdChart.update();
        }
        resetSim();

        document.getElementById('fold-btn').onclick = () => {
            folding = !folding;
            document.getElementById('fold-btn').innerText = folding ? "Pause Simulation" : "Start Resonance Folding";
            if(folding && t === 0) resetSim();
        };

        function animate() {
            requestAnimationFrame(animate);
            standard.group.rotation.y += 0.002;
            lattice.group.rotation.y += 0.002;

            if(folding) {
                t += 0.015;
                
                // Standard Logic: Slow, noisy convergence
                standard.atoms.forEach((a, i) => {
                    const noise = Math.sin(t*5 + i) * 0.5;
                    a.position.x += (Math.cos(t*0.2 + i*0.1)*5 - a.position.x) * 0.005 + noise * 0.01;
                    a.position.y += (Math.sin(t*0.2 + i*0.1)*5 - a.position.y) * 0.005;
                });
                standard.connections.geometry.setFromPoints(standard.atoms.map(a => a.position));

                // Lattice Logic: Resonant, deterministic snap-to-fold
                lattice.atoms.forEach((a, i) => {
                    const phi = 1.618033;
                    const spiral = i * 137.5 * (Math.PI / 180);
                    const r = 12 * Math.exp(-t * 0.2) + (i % 8) * 0.5;
                    const tx = Math.cos(spiral + t) * r;
                    const ty = Math.sin(spiral + t) * r;
                    const tz = Math.cos(t*0.5 + i*0.2) * 4 * Math.exp(-t*0.1);
                    
                    a.position.x += (tx - a.position.x) * 0.08;
                    a.position.y += (ty - a.position.y) * 0.08;
                    a.position.z += (tz - a.position.z) * 0.08;
                });
                lattice.connections.geometry.setFromPoints(lattice.atoms.map(a => a.position));

                // Telemetry
                const rmsd = (1.00 + Math.exp(-t*0.8)*9).toFixed(3);
                const energy = (-280 - (1-Math.exp(-t*0.3))*80).toFixed(2);
                const speedup = (1 + (t*150)).toFixed(1);
                
                document.getElementById('rmsd-val').innerHTML = `${rmsd}<span class="m-unit">Å</span>`;
                document.getElementById('energy-val').innerHTML = `${energy}<span class="m-unit">kJ</span>`;
                document.getElementById('speedup-val').innerText = speedup;

                if(Math.floor(t*100) % 5 === 0) {
                    rmsdChart.data.datasets[0].data.push(rmsd);
                    if(rmsdChart.data.datasets[0].data.length > 30) rmsdChart.data.datasets[0].data.shift();
                    rmsdChart.update('none');
                }
            }

            standard.renderer.render(standard.scene, standard.camera);
            lattice.renderer.render(lattice.scene, lattice.camera);
        }
        animate();

        window.onresize = () => {
            [standard, lattice].forEach(sim => {
                const el = document.getElementById(sim.renderer.domElement.parentElement.id);
                sim.camera.aspect = el.clientWidth / el.clientHeight;
                sim.camera.updateProjectionMatrix();
                sim.renderer.setSize(el.clientWidth, el.clientHeight);
            });
        };
    </script>
</body>
</html>
